<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NnCart PRO Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gray-100 p-4">

<h1 class="text-xl font-bold mb-3">🔥 NnCart PRO Admin</h1>

<!-- STATS -->
<div class="grid grid-cols-4 gap-2 mb-3">
<div class="bg-white p-2 text-center shadow">Orders<br><b id="ordersCount">0</b></div>
<div class="bg-white p-2 text-center shadow">Revenue<br><b id="revenue">₹0</b></div>
<div class="bg-white p-2 text-center shadow">Pending<br><b id="pending">0</b></div>
<div class="bg-white p-2 text-center shadow">Products<br><b id="productsCount">0</b></div>
</div>

<input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3">

<!-- ADD PRODUCT -->
<div class="bg-white p-3 rounded shadow mb-4">
<h2 class="font-bold mb-2">📦 Add / Scan Product</h2>

<input id="barcode" placeholder="Barcode" class="border p-2 w-full mb-1">
<input id="pname" placeholder="Product Name" class="border p-2 w-full mb-1">
<input id="price" placeholder="Price" class="border p-2 w-full mb-1">
<input id="image" placeholder="Image URL" class="border p-2 w-full mb-1">
<input id="category" placeholder="Category" class="border p-2 w-full mb-1">
<input id="stock" placeholder="Stock" class="border p-2 w-full mb-1">
<input id="color" placeholder="Color" class="border p-2 w-full mb-1">
<input id="size" placeholder="Size" class="border p-2 w-full mb-1">

<div class="flex gap-2 mt-2">
<button onclick="startScanner()" class="bg-blue-500 text-white p-2 w-full">Scan</button>
<button onclick="saveProduct()" class="bg-green-500 text-white p-2 w-full">Save</button>
</div>

<div id="scanner" class="mt-2"></div>
</div>

<h2 class="font-bold">Products</h2>
<div id="products"></div>

<h2 class="font-bold mt-4">Orders</h2>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

// 🔥 PUT YOUR REAL FIREBASE HERE
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_PROJECT.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GOOGLE SHEET URL (optional)
const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbw4Uzvp_BTXFxDAYmj4tFCVhNsFqFIUJX7uST0yQV2EomEou3ygdxZUG2fQmyJ8-tg_/exec";

let allOrders = [];
let scanner = null;

// ================= SCANNER =================
window.startScanner = async () => {
try {

if (scanner) {
    await scanner.stop();
    scanner.clear();
}

scanner = new Html5Qrcode("scanner");

const cameras = await Html5Qrcode.getCameras();

if (!cameras.length) {
    alert("❌ Camera not found");
    return;
}

// BACK CAMERA FIX
const backCam = cameras.find(c => c.label.toLowerCase().includes("back")) || cameras[0];

await scanner.start(
    backCam.id,
    { fps: 10, qrbox: 250 },
    async (code) => {

        document.getElementById("barcode").value = code;

        await scanner.stop();
        scanner.clear();

        alert("✅ Scanned: " + code);
    }
);

} catch (e) {
alert("Camera Error: " + e);
console.log(e);
}
};

// ================= SAVE PRODUCT =================
window.saveProduct = async () => {

const product = {
Timestamp: new Date().toISOString(),
Barcode: barcode.value,
"Product Name": pname.value,
"Image URL": image.value,
Price: price.value,
Category: category.value,
Stock: stock.value,
Color: color.value,
Size: size.value
};

// FIREBASE
await addDoc(collection(db,"products"),product);

// GOOGLE SHEET
try{
await fetch(INVENTORY_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(product)
});
}catch(e){}

alert("✅ Saved!");
loadProducts();
};

// ================= LOAD PRODUCTS =================
async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
productsCount.innerText = snap.size;

let html="";
snap.forEach(d=>{
let p=d.data();
html+=`
<div class="bg-white p-2 mb-2 flex justify-between">
${p["Product Name"]} - ₹${p["Price"]}
<button onclick="deleteProduct('${d.id}')" class="bg-red-500 text-white px-2">X</button>
</div>`;
});
products.innerHTML=html;
}

// ================= DELETE PRODUCT =================
window.deleteProduct = async(id)=>{
await deleteDoc(doc(db,"products",id));
loadProducts();
};

// ================= LOAD ORDERS =================
async function loadOrders(){
const snap = await getDocs(collection(db,"orders"));
allOrders = snap.docs.map(d=>({id:d.id,...d.data()}));
renderOrders(allOrders);
updateStats();
}

// ================= RENDER =================
function renderOrders(list){
let html="";
list.forEach(o=>{
html+=`
<div class="bg-white p-2 mb-2">
${o["Customer Name"]} - ₹${o["Total"]}
<br>Status: ${o["Status"]}
<br>
<select onchange="updateStatus('${o.id}',this.value)">
<option ${o["Status"]=="Pending"?"selected":""}>Pending</option>
<option ${o["Status"]=="Shipped"?"selected":""}>Shipped</option>
<option ${o["Status"]=="Delivered"?"selected":""}>Delivered</option>
</select>
<button onclick="deleteOrder('${o.id}')" class="bg-red-500 text-white px-2">Delete</button>
</div>`;
});
orders.innerHTML=html;
}

// ================= STATUS =================
window.updateStatus = async(id,s)=>{
await updateDoc(doc(db,"orders",id),{Status:s});
loadOrders();
};

window.deleteOrder = async(id)=>{
await deleteDoc(doc(db,"orders",id));
loadOrders();
};

// ================= STATS =================
function updateStats(){
let rev=0,p=0;

allOrders.forEach(o=>{
rev+=Number(o.Total||0);
if(o.Status=="Pending") p++;
});

ordersCount.innerText = allOrders.length;
revenue.innerText = "₹"+rev;
pending.innerText = p;
}

// ================= SEARCH =================
search.oninput = (e)=>{
let v=e.target.value.toLowerCase();
renderOrders(allOrders.filter(o=>o["Customer Name"]?.toLowerCase().includes(v)));
};

// ================= START =================
loadProducts();
loadOrders();

</script>

</body>
</html>

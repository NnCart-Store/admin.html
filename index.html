<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart PRO Admin - Auto Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<div class="flex justify-between items-center mb-5">
    <h1 class="text-xl font-bold text-green-400">🚀 NnCart AUTO-BOT</h1>
    <div id="statusIndicator" class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">Ready to Scan</div>
</div>

<div class="grid grid-cols-2 gap-3 mb-6">
    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
        <p class="text-gray-400 text-xs uppercase">Total Products</p>
        <b id="productsCount" class="text-2xl text-blue-400">0</b>
    </div>
    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
        <p class="text-gray-400 text-xs uppercase">Pending Orders</p>
        <b id="pending" class="text-2xl text-red-400">0</b>
    </div>
</div>

<div class="bg-gray-800 p-2 rounded-2xl shadow-2xl overflow-hidden mb-6 border-2 border-dashed border-gray-600">
    <div id="scanner" style="width:100%; min-height:300px;"></div>
    <div id="loadingMsg" class="hidden p-4 text-center animate-pulse text-yellow-400 font-bold">
        🔄 Fetching & Saving to Database...
    </div>
</div>

<div id="lastProduct" class="bg-gray-800 p-4 rounded-xl hidden border border-green-500">
    <p class="text-green-500 text-xs font-bold mb-2">✅ LAST SAVED:</p>
    <div class="flex gap-4">
        <img id="prevImg" src="" class="w-16 h-16 object-cover rounded bg-white">
        <div>
            <h3 id="prevName" class="font-bold text-sm">Product Name</h3>
            <p id="prevBarcode" class="text-xs text-gray-400"></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

    let html5QrCode = null;

    // --- MAIN AUTO-SAVE FUNCTION ---
    async function autoFetchAndSave(barcode) {
        document.getElementById("loadingMsg").classList.remove("hidden");
        document.getElementById("statusIndicator").innerText = "Searching...";

        try {
            // 1. Internet se data uthana (Multi-Source)
            let productData = null;
            
            // Source: OpenFoodFacts
            const offRes = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const offData = await offRes.json();

            if (offData.status === 1) {
                productData = {
                    Barcode: barcode,
                    Name: offData.product.product_name || offData.product.product_name_en || "Branded Product",
                    Image: offData.product.image_url || "",
                    Category: offData.product.categories?.split(',')[0] || "General",
                    Price: "0", // Internet APIs usually don't give live retail price
                    Stock: "1",
                    Timestamp: new Date().toISOString()
                };
            }

            if (productData) {
                // 2. Firebase Mein Save Karna
                await addDoc(collection(db, "products"), productData);

                // 3. Google Sheet Mein Save Karna
                await fetch(`${INVENTORY_URL}?action=addProduct`, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(productData)
                });

                // UI Update
                showLastSaved(productData);
                document.getElementById("statusIndicator").innerText = "Success! Ready Next.";
            } else {
                alert("⚠️ Ye product internet par nahi mila!");
                document.getElementById("statusIndicator").innerText = "Not Found";
            }
        } catch (error) {
            console.error(error);
            alert("❌ Network Error!");
        } finally {
            document.getElementById("loadingMsg").classList.add("hidden");
            // Scanner ko thoda wait dekar wapas chalu karna taaki lagatar scan na ho
            setTimeout(() => { startScanner(); }, 2000);
        }
    }

    function showLastSaved(p) {
        document.getElementById("lastProduct").classList.remove("hidden");
        document.getElementById("prevName").innerText = p.Name;
        document.getElementById("prevBarcode").innerText = "Barcode: " + p.Barcode;
        document.getElementById("prevImg").src = p.Image || "https://via.placeholder.com/100";
        updateCount();
    }

    window.startScanner = () => {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("scanner");
        
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            async (decodedText) => {
                await html5QrCode.stop();
                autoFetchAndSave(decodedText);
            }
        ).catch(err => console.log(err));
    };

    async function updateCount() {
        const snap = await getDocs(collection(db, "products"));
        document.getElementById("productsCount").innerText = snap.size;
    }

    // Launch scanner on load
    startScanner();
    updateCount();
</script>

</body>
</html>

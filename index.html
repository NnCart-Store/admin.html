<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart PRO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
</head>

<body class="bg-gray-100 p-4">

<div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">🔥 NnCart PRO Admin</h1>
    <button onclick="startScanner()" class="bg-blue-500 text-white p-3 rounded-full">📷</button>
</div>

<div class="grid grid-cols-4 gap-2 mb-3">
    <div class="bg-white p-2 text-center shadow text-xs">Orders<br><b id="ordersCount">0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Revenue<br><b id="revenue">₹0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Pending<br><b id="pending">0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Products<br><b id="productsCount">0</b></div>
</div>

<input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3">

<div class="bg-white p-3 rounded shadow mb-4">
    <h2 class="font-bold mb-2">📦 Add / Scan Product</h2>
    <input id="barcode" placeholder="Barcode" class="border p-2 w-full mb-1">
    <input id="pname" placeholder="Product Name" class="border p-2 w-full mb-1">
    <input id="price" placeholder="Price" class="border p-2 w-full mb-1">
    <input id="image" placeholder="Image URL" class="border p-2 w-full mb-1">
    <input id="category" placeholder="Category" class="border p-2 w-full mb-1">
    <input id="stock" placeholder="Stock" class="border p-2 w-full mb-1">
    <input id="color" placeholder="Color" class="border p-2 w-full mb-1">
    <input id="size" placeholder="Size" class="border p-2 w-full mb-1">

    <div class="flex gap-2 mt-2">
        <button onclick="startScanner()" class="bg-blue-500 text-white p-2 w-full">Scan</button>
        <button id="saveBtn" onclick="saveProduct()" class="bg-green-500 text-white p-2 w-full">Save</button>
    </div>

    <div id="scanner" style="width:100%; min-height:300px; margin-top:10px;"></div>
</div>

<h2 class="font-bold">Products</h2>
<div id="products"></div>

<h2 class="font-bold mt-4">Orders</h2>
<div id="orders"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbzp6AZrQOG2CPByIVlmpJmYiPtlreh9tLV8rOIO38T_Q4tM-P09ac9_kb-32DJAQWOz/exec";

    let html5QrCode = null;

    // 🔥 SMART SCANNER (Auto-Fetch Enabled)
    window.startScanner = async () => {
        const scannerDiv = document.getElementById("scanner");
        scannerDiv.innerHTML = '<div id="qr-reader" style="width: 100%;"></div>';
        html5QrCode = new Html5Qrcode("qr-reader");

        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                async (decodedText) => {
                    document.getElementById("barcode").value = decodedText;
                    document.getElementById("pname").value = "🔎 Searching Global Database...";
                    
                    try {
                        const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json`);
                        const result = await response.json();
                        
                        if (result && result.status === 1) {
                            const p = result.product;
                            const productName = p.product_name || p.product_name_en || p.generic_name || "Branded Item";
                            document.getElementById("pname").value = productName;
                            document.getElementById("image").value = p.image_url || p.image_front_url || "";
                            document.getElementById("category").value = p.categories ? p.categories.split(',')[0] : "General";
                            alert("✅ Global Brand Found: " + productName);
                        } else {
                            document.getElementById("pname").value = "";
                            alert("⚠️ Manual entry karni hogi.");
                        }
                    } catch (e) { 
                        document.getElementById("pname").value = "";
                    }
                    
                    html5QrCode.stop();
                    scannerDiv.innerHTML = "";
                }
            );
        } catch (err) { 
            alert("❌ Camera Error!"); 
        }
    };
    

    // 🔥 FIXED SAVE PRODUCT (Saves to both Firebase & Google Sheets)
    window.saveProduct = async () => {
        const barcodeVal = document.getElementById("barcode").value;
        const nameVal = document.getElementById("pname").value;

        if (!barcodeVal || !nameVal) { 
            alert("❌ Barcode aur Name zaroori hai!"); 
            return; 
        }

        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "Saving...";
        
        const product = {
            Barcode: barcodeVal,
            Name: nameVal,
            Price: document.getElementById("price").value || "0",
            Image: document.getElementById("image").value || "",
            Category: document.getElementById("category").value || "",
            Stock: document.getElementById("stock").value || "0",
            Color: document.getElementById("color").value || "",
            Size: document.getElementById("size").value || ""
        };

        try {
            // 1. Firebase Save
            await addDoc(collection(db, "products"), product);

            // 2. Google Sheet Save (Fixed Request)
            const sheetParams = new URLSearchParams({
                action: "addProduct",
                ...product
            }).toString();

            // Direct ping to Google Apps Script
            const imgPing = new Image();
            imgPing.src = `${INVENTORY_URL}?${sheetParams}`;

            alert("✅ Firebase aur Google Sheet dono mein save ho gaya!");
            
            // Wait for ping to send before reload
            setTimeout(() => { location.reload(); }, 1000);

        } catch (e) {
            alert("❌ Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Save";
        }
    };

    window.loadProducts = async () => {
        try {
            const snap = await getDocs(collection(db, "products"));
            document.getElementById("productsCount").innerText = snap.size;
        } catch (e) { console.log("Load error"); }
    };

    window.loadOrders = async () => {
        try {
            const response = await fetch(INVENTORY_URL + "?action=getOrders");
            const data = await response.json();
            let orders = data.orders || []; 
            let ordersHTML = "";
            let packedCount = 0;

            orders.forEach(order => {
                let worker = order.Staff_ID || "Not Assigned";
                let status = order.Packing_Status || "Pending";
                if(status === "Packed") packedCount++;
                let statusColor = status === "Packed" ? "text-green-600" : "text-red-500";

                ordersHTML += `
                    <div class="border-b p-2 bg-gray-50 mb-1 rounded flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-gray-700">Order: #${order.OrderID}</p>
                            <p class="text-[10px] text-blue-500 font-bold">Packed By: ${worker}</p>
                        </div>
                        <span class="text-[10px] font-bold ${statusColor}">${status.toUpperCase()}</span>
                    </div>`;
            });
            document.getElementById('orders').innerHTML = ordersHTML;
            document.getElementById('ordersCount').innerText = orders.length;
            document.getElementById('pending').innerText = orders.length - packedCount;
        } catch (e) { console.log("Load error"); }
    };

    loadOrders();
    loadProducts();
    setInterval(loadOrders, 20000);
</script>
</body>
</html>

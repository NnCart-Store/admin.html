<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart PRO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
</head>

<body class="bg-gray-100 p-4">

<div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">🔥 NnCart PRO Admin</h1>
    <button onclick="startScanner()" class="bg-blue-500 text-white p-3 rounded-full">📷</button>
</div>

<div class="grid grid-cols-4 gap-2 mb-3">
    <div class="bg-white p-2 text-center shadow">Orders<br><b id="ordersCount">0</b></div>
    <div class="bg-white p-2 text-center shadow">Revenue<br><b id="revenue">₹0</b></div>
    <div class="bg-white p-2 text-center shadow">Pending<br><b id="pending">0</b></div>
    <div class="bg-white p-2 text-center shadow">Products<br><b id="productsCount">0</b></div>
</div>

<input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3">

<div class="bg-white p-3 rounded shadow mb-4">
    <h2 class="font-bold mb-2">📦 Add / Scan Product</h2>
    <input id="barcode" placeholder="Barcode" class="border p-2 w-full mb-1">
    <input id="pname" placeholder="Product Name" class="border p-2 w-full mb-1">
    <input id="price" placeholder="Price" class="border p-2 w-full mb-1">
    <input id="image" placeholder="Image URL" class="border p-2 w-full mb-1">
    <input id="category" placeholder="Category" class="border p-2 w-full mb-1">
    <input id="stock" placeholder="Stock" class="border p-2 w-full mb-1">
    <input id="color" placeholder="Color" class="border p-2 w-full mb-1">
    <input id="size" placeholder="Size" class="border p-2 w-full mb-1">

    <div class="flex gap-2 mt-2">
        <button onclick="startScanner()" class="bg-blue-500 text-white p-2 w-full">Scan</button>
        <button onclick="saveProduct()" class="bg-green-500 text-white p-2 w-full">Save</button>
    </div>

    <div id="scanner" style="width:100%; min-height:300px; margin-top:10px;"></div>
</div>

<h2 class="font-bold">Products</h2>
<div id="products"></div>

<h2 class="font-bold mt-4">Orders</h2>
<div id="orders"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // FIREBASE CONFIG (Cleaned up)
    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GOOGLE SHEET
    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbxJyzPwLSZ2BAStTcbo-EhAXeiMtc97ZhRhUAoLcNIOpF8-C1m81M77rlL7AYYo8JoP/exec";

    // Scanner variable
    let html5QrCode = null;

    // 🔥 FIXED SCANNER
    window.startScanner = async () => {
        const scannerDiv = document.getElementById("scanner");
        scannerDiv.innerHTML = '<div id="qr-reader" style="width: 100%;"></div>';
        
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("qr-reader");
        }

        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    document.getElementById("barcode").value = decodedText;
                    alert("✅ Scan Success: " + decodedText);
                    html5QrCode.stop();
                    scannerDiv.innerHTML = "";
                }
            );
        } catch (err) {
            alert("❌ Camera Error: " + err + "\n\nTip: Browser ko Camera permission Allow karo.");
        }
    };

    // 🔥 SAVE PRODUCT
    window.saveProduct = async () => {
        if (!document.getElementById("barcode").value) { alert("❌ Barcode daalo"); return; }
        
        const product = {
            Barcode: document.getElementById("barcode").value,
            "Product Name": document.getElementById("pname").value,
            Price: document.getElementById("price").value
        };

        await addDoc(collection(db, "products"), product);
        alert("✅ Saved!");
    };

    // Other functions (Keep them as they were)
    window.loadProducts = async () => {
        const snap = await getDocs(collection(db, "products"));
        document.getElementById("productsCount").innerText = snap.size;
    };
    
    loadProducts();
</script>
</body>
</html>

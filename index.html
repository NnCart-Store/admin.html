<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-200 p-4">

    <h1 class="text-xl font-bold mb-4 text-center">NnCart AI Admin</h1>

    <div id="reader" class="rounded-2xl overflow-hidden mb-4 bg-black shadow-lg"></div>
    <button onclick="window.startScan()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md">📷 SCAN BARCODE</button>

    <div id="popup" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-gray-100 h-48 flex items-center justify-center border-b">
                <img id="preview-img" src="" class="h-full w-full object-contain p-2" alt="No Photo Found">
            </div>

            <div class="p-5 space-y-3">
                <input id="pname" placeholder="Product Name" class="w-full p-2 border-b font-bold outline-none">
                <div class="flex gap-2">
                    <input id="price" type="number" placeholder="Set Price ₹" class="w-1/2 p-2 border rounded bg-yellow-50 outline-none">
                    <input id="stock" type="number" value="1" class="w-1/2 p-2 border rounded outline-none">
                </div>
                <input id="category" placeholder="Category" class="w-full p-2 border rounded text-xs outline-none">
                <input id="barcode" class="w-full p-2 text-[10px] text-gray-400 bg-gray-50 border-none outline-none" readonly>
                
                <div class="flex gap-2 mt-4">
                    <button onclick="document.getElementById('popup').classList.add('hidden')" class="w-1/3 bg-gray-200 p-3 rounded-xl font-bold text-gray-600">Cancel</button>
                    <button id="saveBtn" onclick="window.saveAll()" class="w-2/3 bg-green-600 text-white p-3 rounded-xl font-bold shadow-lg">✅ Confirm & Save</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I",
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

    let scanner = new Html5Qrcode("reader");

    window.startScan = () => {
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, async (txt) => {
            scanner.stop();
            document.getElementById("barcode").value = txt;
            document.getElementById("popup").classList.remove("hidden"); // Show Popup
            document.getElementById("pname").value = "🔎 AI Searching...";
            document.getElementById("preview-img").src = "https://cdn-icons-png.flaticon.com/512/107/107831.png"; // Loading icon

            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${txt}.json`);
                const data = await res.json();
                
                if (data.status === 1) {
                    document.getElementById("pname").value = data.product.product_name || "Branded Item";
                    document.getElementById("category").value = data.product.categories?.split(',')[0] || "General";
                    document.getElementById("preview-img").src = data.product.image_url || "";
                } else {
                    document.getElementById("pname").value = "";
                    document.getElementById("pname").placeholder = "Naam bharein (Brand nahi mila)";
                    document.getElementById("preview-img").src = "https://cdn-icons-png.flaticon.com/512/3342/3342137.png"; // Placeholder icon
                }
            } catch (e) {
                document.getElementById("pname").value = "Manual Entry";
            }
        });
    };

    window.saveAll = async () => {
        const btn = document.getElementById("saveBtn");
        const product = {
            Barcode: document.getElementById("barcode").value,
            Name: document.getElementById("pname").value,
            Price: document.getElementById("price").value || "0",
            Stock: document.getElementById("stock").value || "1",
            Image: document.getElementById("preview-img").src,
            Category: document.getElementById("category").value || ""
        };

        if (!product.Name) { alert("Naam bharna zaroori hai!"); return; }
        
        btn.disabled = true; btn.innerText = "Saving...";

        try {
            await addDoc(collection(db, "products"), product);
            fetch(`${SHEET_URL}?action=addProduct&${new URLSearchParams(product)}`, { mode: "no-cors" });
            alert("✅ Saved Successfully!");
            location.reload();
        } catch (e) { alert("Error!"); btn.disabled = false; }
    };
</script>
</body>
</html>

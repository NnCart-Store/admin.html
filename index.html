<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart PRO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
</head>

<body class="bg-gray-100 p-4 pb-20">

<div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">🔥 NnCart PRO Admin</h1>
    <button onclick="window.startScanner()" class="bg-blue-500 text-white p-3 rounded-full shadow-lg">📷</button>
</div>

<div class="grid grid-cols-4 gap-2 mb-3">
    <div class="bg-white p-2 text-center shadow text-[10px] rounded">Orders<br><b id="ordersCount">0</b></div>
    <div class="bg-white p-2 text-center shadow text-[10px] rounded">Revenue<br><b id="revenue">₹0</b></div>
    <div class="bg-white p-2 text-center shadow text-[10px] rounded text-red-500">Pending<br><b id="pending">0</b></div>
    <div class="bg-white p-2 text-center shadow text-[10px] rounded text-blue-600">Products<br><b id="productsCount">0</b></div>
</div>

<input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3 rounded-lg outline-none shadow-sm focus:ring-2 ring-blue-400">

<div class="bg-white p-3 rounded-xl shadow-md mb-4 border-t-4 border-blue-500">
    <h2 class="font-bold mb-2 flex items-center">📦 Add / Scan Product</h2>
    
    <div id="scanner-wrapper" class="hidden mb-3 overflow-hidden rounded-lg bg-black border-2 border-blue-300">
        <div id="qr-reader" style="width:100%;"></div>
        <button onclick="window.stopScanner()" class="w-full bg-red-500 text-white p-2 text-xs font-bold">CLOSE CAMERA</button>
    </div>

    <div class="space-y-2">
        <input id="barcode" placeholder="Barcode ID" class="border p-2 w-full rounded bg-gray-50 font-mono text-blue-600">
        <input id="pname" placeholder="Product Name (AI Auto-fills)" class="border p-2 w-full rounded">
        
        <div class="flex gap-2">
            <input id="price" placeholder="Price (₹)" type="number" class="border p-2 w-1/2 rounded">
            <input id="stock" placeholder="Stock" type="number" class="border p-2 w-1/2 rounded">
        </div>
        
        <input id="image" placeholder="Image URL (AI Auto-fills)" class="border p-2 w-full rounded text-xs text-gray-400">
        
        <div class="grid grid-cols-3 gap-2">
            <input id="category" placeholder="Category" class="border p-2 rounded text-xs">
            <input id="color" placeholder="Color" class="border p-2 rounded text-xs">
            <input id="size" placeholder="Size" class="border p-2 rounded text-xs">
        </div>
    </div>

    <div class="flex gap-2 mt-4">
        <button onclick="window.startScanner()" class="bg-blue-500 text-white p-3 w-full rounded-xl font-bold active:scale-95 transition-all shadow-md">SCAN</button>
        <button id="saveBtn" onclick="window.saveProduct()" class="bg-green-500 text-white p-3 w-full rounded-xl font-bold active:scale-95 transition-all shadow-md">SAVE</button>
    </div>
</div>

<h2 class="font-bold text-gray-700 mb-2">Live Orders</h2>
<div id="orders" class="space-y-2">
    <p class="text-center text-gray-400 py-4 italic text-xs">Loading orders...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

    let html5QrCode = null;

    // 🔥 FIX: window object ke saath functions jode taaki HTML buttons unhe dhund sakein
    window.startScanner = async () => {
        const wrapper = document.getElementById("scanner-wrapper");
        wrapper.classList.remove("hidden");
        
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("qr-reader");
        }

        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                async (decodedText) => {
                    document.getElementById("barcode").value = decodedText;
                    document.getElementById("pname").value = "🔎 AI Searching...";
                    
                    window.stopScanner(); // Scan hote hi camera band

                    // AI Auto-Fetch Logic
                    try {
                        const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json`);
                        const result = await response.json();
                        
                        if (result && result.status === 1) {
                            const p = result.product;
                            document.getElementById("pname").value = p.product_name || p.product_name_en || "Branded Item";
                            document.getElementById("image").value = p.image_url || "";
                            document.getElementById("category").value = p.categories ? p.categories.split(',')[0] : "General";
                            alert("✅ AI ne product dhund liya!");
                        } else {
                            document.getElementById("pname").value = "";
                            alert("⚠️ Global Brand nahi mila. Details manual bharein.");
                        }
                    } catch (e) { 
                        document.getElementById("pname").value = ""; 
                    }
                }
            );
        } catch (err) { 
            alert("❌ Camera Error! Permission dein."); 
        }
    };

    window.stopScanner = () => {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById("scanner-wrapper").classList.add("hidden");
            }).catch(err => console.log("Stop error"));
        }
    };

    window.saveProduct = async () => {
        const barcodeVal = document.getElementById("barcode").value;
        const nameVal = document.getElementById("pname").value;

        if (!barcodeVal || !nameVal) { 
            alert("❌ Barcode aur Name zaroori hai!"); 
            return; 
        }

        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "Saving...";
        
        const product = {
            Barcode: barcodeVal,
            Name: nameVal,
            Price: document.getElementById("price").value || "0",
            Image: document.getElementById("image").value || "",
            Category: document.getElementById("category").value || "",
            Stock: document.getElementById("stock").value || "0",
            Color: document.getElementById("color").value || "",
            Size: document.getElementById("size").value || "",
            Timestamp: new Date().toISOString()
        };

        try {
            // 1. Firebase Save
            await addDoc(collection(db, "products"), product);

            // 2. Google Sheet Save (URL ke query params mein data bhej rahe hain)
            const params = new URLSearchParams(product).toString();
            await fetch(INVENTORY_URL + "?action=addProduct&" + params, {
                method: "GET", // Apps Script GET request handle karna aasaan hota hai
                mode: "no-cors"
            });

            alert("✅ Saved Successfully!");
            location.reload(); 
        } catch (e) {
            alert("❌ Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Save";
        }
    };

    window.loadOrders = async () => {
        try {
            const response = await fetch(INVENTORY_URL + "?action=getOrders");
            const data = await response.json();
            let orders = data.orders || []; 
            let ordersHTML = "";
            let packedCount = 0;

            orders.forEach(order => {
                let worker = order.Staff_ID || "Not Assigned";
                let status = order.Packing_Status || "Pending";
                if(status === "Packed") packedCount++;
                let statusColor = status === "Packed" ? "text-green-600" : "text-red-500";

                ordersHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 ${status === 'Packed' ? 'border-green-500' : 'border-red-400'} flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black">ID: #${order.OrderID}</p>
                            <p class="text-[10px] text-gray-500 font-bold">Worker: ${worker}</p>
                        </div>
                        <span class="text-[10px] font-black ${statusColor}">${status.toUpperCase()}</span>
                    </div>`;
            });
            document.getElementById('orders').innerHTML = ordersHTML || '<p class="text-center text-xs py-4 text-gray-400">No Orders Found</p>';
            document.getElementById('ordersCount').innerText = orders.length;
            document.getElementById('pending').innerText = orders.length - packedCount;
        } catch (e) { 
            console.log("Load error"); 
        }
    };

    // Initial Load
    const snap = await getDocs(collection(db, "products"));
    document.getElementById("productsCount").innerText = snap.size;
    
    window.loadOrders();
    setInterval(window.loadOrders, 30000); // 30 sec auto-update
</script>
</body>
</html>

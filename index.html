

<!DOCTYPE html>  <html lang="hi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>NnCart Admin</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://unpkg.com/html5-qrcode"></script>  
    <link rel="manifest" href="manifest.json">  
</head>  <body class="bg-gray-100 p-4">  <div class="flex justify-between items-center mb-3">  
    <h1 class="text-xl font-bold text-blue-600">🔥 NnCart Admin</h1>  
    <button onclick="startScanner()" class="bg-blue-500 text-white p-3 rounded-full shadow-lg">📷</button>  
</div>  <!-- Dashboard Stats -->  <div class="grid grid-cols-4 gap-2 mb-3">  
    <div class="bg-white p-2 text-center shadow rounded-lg text-[10px]">Orders<br><b id="ordersCount" class="text-sm">0</b></div>  
    <div class="bg-white p-2 text-center shadow rounded-lg text-[10px]">Revenue<br><b id="revenue" class="text-sm">₹0</b></div>  
    <div class="bg-white p-2 text-center shadow rounded-lg text-[10px] text-red-500">Pending<br><b id="pending" class="text-sm">0</b></div>  
    <div class="bg-white p-2 text-center shadow rounded-lg text-[10px] text-blue-500">Products<br><b id="productsCount" class="text-sm">0</b></div>  
</div>  <input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3 rounded-lg shadow-sm">  <!-- Add Product Section -->  <div class="bg-white p-3 rounded-xl shadow-md mb-4 border-t-4 border-green-500">  
    <h2 class="font-bold mb-2 flex items-center gap-2">📦 Inventory Manager</h2>  
    <div class="grid grid-cols-2 gap-2">  
        <input id="barcode" placeholder="Barcode" class="border p-2 rounded text-sm font-mono bg-gray-50">  
        <input id="category" placeholder="Category" class="border p-2 rounded text-sm">  
    </div>  
    <input id="pname" placeholder="Product Name" class="border p-2 w-full mt-2 rounded text-sm">  
    <div class="grid grid-cols-3 gap-2 mt-2">  
        <input id="price" placeholder="Price" type="number" class="border p-2 rounded text-sm">  
        <input id="stock" placeholder="Stock" type="number" class="border p-2 rounded text-sm">  
        <input id="size" placeholder="Size" class="border p-2 rounded text-sm">  
    </div>  
    <input id="image" placeholder="Image Direct Link (Postimg)" class="border p-2 w-full mt-2 rounded text-sm">  
    <input id="color" placeholder="Color" class="border p-2 w-full mt-2 rounded text-sm">  <div class="flex gap-2 mt-4">  
    <button onclick="startScanner()" class="bg-blue-600 text-white p-2 w-full rounded-lg font-bold">SCAN</button>  
    <button id="saveBtn" onclick="saveProduct()" class="bg-green-600 text-white p-2 w-full rounded-lg font-bold">SAVE BOTH</button>  
</div>  

<div id="scanner-wrapper" class="hidden mt-3 rounded-lg overflow-hidden border-2 border-blue-500">  
    <div id="scanner" style="width:100%;"></div>  
    <button onclick="stopScanner()" class="w-full bg-red-500 text-white p-2 text-xs">CANCEL SCAN</button>  
</div>

</div>  <!-- Inventory Display List -->  <h2 class="font-bold mb-2 text-gray-700 flex justify-between items-center">  
    Current Inventory   
    <span class="text-[10px] font-normal text-gray-400">Showing last entries</span>  
</h2>  
<div id="products" class="space-y-2 mb-6">  
    <p class="text-center text-gray-400 py-4 text-sm italic">Loading products list...</p>  
</div>  <h2 class="font-bold mt-4 mb-2 text-gray-700">Recent Orders</h2>  
<div id="orders" class="space-y-2"></div>  <script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";  
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";  
  
    const firebaseConfig = {  
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I",   
        authDomain: "nncart.firebaseapp.com",  
        projectId: "nncart",  
        storageBucket: "nncart.firebasestorage.app",  
        messagingSenderId: "662993037031",  
        appId: "1:662993037031:web:893e379fe374cb74d26442"  
    };  
  
    const app = initializeApp(firebaseConfig);  
    const db = getFirestore(app);  
  
    // ⚠️ Apne latest 'Anyone' permission wale URL se replace karein  
    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbylB4E60JYb4IGjLEgDGyezNDPebq8RjY_gyiEh9rx8ONoJK2UM5HlyUXK8SPjXSW_V/exec";  
  
    let html5QrCode = null;  
  
    window.startScanner = async () => {  
        document.getElementById("scanner-wrapper").classList.remove("hidden");  
        html5QrCode = new Html5Qrcode("scanner");  
        try {  
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 },   
                async (decodedText) => {  
                    document.getElementById("barcode").value = decodedText;  
                    document.getElementById("pname").value = "🔎 Searching...";  
                    stopScanner();  
                      
                    try {  
                        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json`);  
                        const d = await res.json();  
                        if (d.status === 1) {  
                            document.getElementById("pname").value = d.product.product_name || "";  
                            document.getElementById("image").value = d.product.image_url || "";  
                            document.getElementById("category").value = d.product.categories?.split(',')[0] || "General";  
                        }  
                    } catch (e) { document.getElementById("pname").value = ""; }  
                }  
            );  
        } catch (err) { alert("Camera error"); }  
    };  
  
    window.stopScanner = () => {  
        if (html5QrCode) {  
            html5QrCode.stop().then(() => {  
                document.getElementById("scanner-wrapper").classList.add("hidden");  
            });  
        }  
    };  
  
    window.saveProduct = async () => {  
        const btn = document.getElementById("saveBtn");  
        const product = {  
            Barcode: document.getElementById("barcode").value,  
            Name: document.getElementById("pname").value,  
            Price: document.getElementById("price").value || "0",  
            Image: document.getElementById("image").value || "",  
            Category: document.getElementById("category").value || "General",  
            Stock: document.getElementById("stock").value || "0",  
            Color: document.getElementById("color").value || "",  
            Size: document.getElementById("size").value || ""  
        };  
  
        if (!product.Barcode || !product.Name) return alert("Fill Barcode & Name!");  
  
        btn.disabled = true; btn.innerText = "Saving...";  
  
        try {  
            await addDoc(collection(db, "products"), product);  
            const params = new URLSearchParams({ action: "addProduct", ...product }).toString();  
            const img = new Image();  
            img.src = `${INVENTORY_URL}?${params}`;  
              
            setTimeout(() => {   
                alert("✅ Saved Everywhere!");  
                location.reload();   
            }, 1200);  
        } catch (e) {  
            alert("Error: " + e.message);  
            btn.disabled = false; btn.innerText = "SAVE BOTH";  
        }  
    };  
  
    // 🔥 FIXED: Isme photo dikhane ka pura logic add kar diya hai  
    window.loadProducts = async () => {  
        try {  
            // Stats count from Firebase  
            const snap = await getDocs(collection(db, "products"));  
            document.getElementById("productsCount").innerText = snap.size;  
  
            // List from Google Sheet (To get latest data + Photos)  
            const response = await fetch(INVENTORY_URL + "?action=getInventory");  
            const items = await response.json();  
              
            let html = "";  
            items.reverse().forEach(item => { // Reverse takki naya pehle dikhe  
                html += `  
                <div class="bg-white p-2 rounded-lg shadow-sm border flex items-center gap-3">  
                    <img src="${item.Image}" class="w-14 h-14 object-cover rounded bg-gray-100" onerror="this.src='https://via.placeholder.com/60?text=No+Img'">  
                    <div class="flex-1">  
                        <h4 class="font-bold text-xs truncate w-40">${item.Name}</h4>  
                        <p class="text-[10px] text-gray-500">Code: ${item.Barcode}</p>  
                        <div class="flex justify-between items-center mt-1">  
                            <span class="text-blue-600 font-bold text-xs">₹${item.Price}</span>  
                            <span class="bg-gray-100 px-2 py-0.5 rounded text-[9px]">Stock: ${item.Stock}</span>  
                        </div>  
                    </div>  
                </div>`;  
            });  
            document.getElementById('products').innerHTML = html || "No products found.";  
        } catch (e) {   
            console.error(e);  
            document.getElementById('products').innerHTML = "Error loading inventory.";  
        }  
    };  
  
    window.loadOrders = async () => {  
        try {  
            const res = await fetch(INVENTORY_URL + "?action=getOrders");  
            const data = await res.json();  
            let orders = data.orders || [];   
            let html = "";  
            let packed = 0;  
  
            orders.forEach(o => {  
                if(o.Status === "Packed") packed++;  
                html += `  
                    <div class="border-b p-2 bg-white rounded-lg shadow-sm mb-1 flex justify-between items-center">  
                        <div>  
                            <p class="text-[10px] font-bold">#${o.OrderID} - ${o.Customer}</p>  
                            <p class="text-[9px] text-gray-400">${o.Date}</p>  
                        </div>  
                        <span class="text-[9px] font-bold ${o.Status === 'Packed' ? 'text-green-500' : 'text-red-400'}">${o.Status}</span>  
                    </div>`;  
            });  
            document.getElementById('orders').innerHTML = html;  
            document.getElementById('ordersCount').innerText = orders.length;  
            document.getElementById('pending').innerText = orders.length - packed;  
        } catch (e) { console.log("Orders error"); }  
    };  
  
    loadOrders();  
    loadProducts();  
</script>  </body>  
</html>
